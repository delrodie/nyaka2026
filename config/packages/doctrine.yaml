doctrine:
    dbal:
        connections:
            # Ta base de données principale
            default:
                url: '%env(resolve:DATABASE_URL_MAIN)%'
                profiling_collect_backtrace: '%kernel.debug%'
            # Ta base de données de recherche (exexistante)
            list_db:
                url: '%env(resolve:DATABASE_URL_LIST)%'

    orm:
#        auto_generate_proxy_classes: true
#        enable_lazy_ghost_objects: true
        default_entity_manager: default

        entity_managers:
            # Gestionnaire pour la base MAIN
            default:
                connection: default
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                mappings:
                    MainApp:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity/Main'
                        prefix: 'App\Entity\Main'
                        alias: MainApp

            # Gestionnaire pour la base LIST
            list_manager:
                connection: list_db
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                mappings:
                    ListApp:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity/List'
                        prefix: 'App\Entity\List'
                        alias: ListApp
when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
